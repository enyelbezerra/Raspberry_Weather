conky.config = {
    alignment = 'top_left',
    background = false,
    border_width = 1,
    cpu_avg_samples = 4,
    net_avg_samples = 2,
    double_buffer = true,
    font = 'DejaVu Sans Mono:size=8',
    gap_x = 20,
    gap_y = 45,

    minimum_width = 280,
    maximum_width = 280,
    minimum_height = 720,

    out_to_x = false,
    out_to_wayland = true,

    own_window = true,
    own_window_type = 'desktop',
    own_window_argb_visual = true,
    own_window_argb_value = 160,
    own_window_colour = '#1C1C1C',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_title = '🍓 Raspberry Pi System Monitor',

    update_interval = 1.5,
    use_xft = true,
    xftalpha = 0.95,
    text_buffer_size = 2048,

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,

    default_color = 'white',
    color1 = '#87CEEB',
    color2 = '#00FFFF',
    color3 = '#FFA500',
    color4 = '#98FB98',
};

conky.text = [[
${image ~/.config/conky/pi-logo.png -p 8,8 -s 245x58 -f 86400}

${voffset 15}

${color1}🌡️ Temperatura
${color2}CPU: ${execi 5 sensors coretemp-isa-0000 | grep 'Package id 0:' | awk '{print $4}'}°C
#${color2}GPU: ${execi 6 nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits 2>/dev/null || echo "--"}°C

${color1}⚙️ CPU - 4 Núcleos
${color3}${cpubar cpu0 6,255} ${cpu cpu0}%
${color3}${cpubar cpu1 6,255} ${cpu cpu1}%
${color3}${cpubar cpu2 6,255} ${cpu cpu2}%
${color3}${cpubar cpu3 6,255} ${cpu cpu3}%

${voffset 8}${color1}📊 Carga do Sistema
${color2}${freq_g} GHz   |   Load: ${loadavg 1} ${loadavg 2} ${loadavg 3}

${voffset 8}${color1}💾 Memória RAM
${color2}${memperc}%   ${mem} / ${memmax}
${color3}${membar 8,255}

${color1}💾 Swap
${color2}${swapperc}%   ${swap} / ${swapmax}
${color3}${swapbar 8,255}

${voffset 10}${color1}💿 NVMe (nvme0n1)
${color2}Leitura: ${diskio_read nvme0n1}  ${alignr}${execi 2 echo $(( ${diskio_read nvme0n1} / 1048576 ))} MB/s
${color4}${diskiograph_read nvme0n1 24,255 00ff88 008800 -t}

${color2}Escrita: ${diskio_write nvme0n1}  ${alignr}${execi 2 echo $(( ${diskio_write nvme0n1} / 1048576 ))} MB/s
${color3}${diskiograph_write nvme0n1 24,255 ff4400 880000 -t}

${voffset 10}${color1}🌐 Rede • wlan0
${color2}↓ Download: ${downspeedf wlan0}   ${alignr}${totaldown wlan0}
${color4}${downspeedgraph wlan0 24,255 00ff88 006600 -l}

${color2}↑ Upload:   ${upspeedf wlan0}   ${alignr}${totalup wlan0}
${color3}${upspeedgraph wlan0 24,255 ff4400 660000 -l}

${voffset 12}${color1}🎵 Deezer Now Playing
${color2}${execi 2 playerctl --player=deezer metadata --format "{{artist}} - {{title}}" 2>/dev/null || echo "Nada tocando..."}
${color3}${execi 2 playerctl --player=deezer status 2>/dev/null | grep -q "Playing" && echo "▶️  Tocando" || echo "⏸️  Pausado"}

${voffset 12}${color1}🔥 Top 5 - CPU
${color3}Nome                  PID     CPU%    MEM%
${color2}${top name 1} ${alignr}${top pid 1}  ${top cpu 1}%  ${top mem 1}%
${color2}${top name 2} ${alignr}${top pid 2}  ${top cpu 2}%  ${top mem 2}%
${color2}${top name 3} ${alignr}${top pid 3}  ${top cpu 3}%  ${top mem 3}%
${color2}${top name 4} ${alignr}${top pid 4}  ${top cpu 4}%  ${top mem 4}%
${color2}${top name 5} ${alignr}${top pid 5}  ${top cpu 5}%  ${top mem 5}%

${voffset 8}${color1}🔋 Top 3 - Memória
${color2}${top_mem name 1} ${alignr}${top_mem pid 1}  ${top_mem cpu 1}%  ${top_mem mem 1}%
${color2}${top_mem name 2} ${alignr}${top_mem pid 2}  ${top_mem cpu 2}%  ${top_mem mem 2}%
${color2}${top_mem name 3} ${alignr}${top_mem pid 3}  ${top_mem cpu 3}%  ${top_mem mem 3}%
]];
