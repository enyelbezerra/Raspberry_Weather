-- ==================== CONKY DIREITO - CLIMA WH1080 ====================

conky.config = {
    alignment = 'top_right',
    background = false,
    border_width = 1,
    double_buffer = true,

    font = 'DejaVu Sans Mono:size=8',
    gap_x = 20,
    gap_y = 45,

    minimum_width = 290,
    maximum_width = 290,
    minimum_height = 720,

    out_to_x = false,
    out_to_wayland = true,

    own_window = true,
    own_window_type = 'desktop',
    own_window_argb_visual = true,
    own_window_argb_value = 70,
    own_window_colour = '#1C1C1C',
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_title = '🍓 Raspberry Pi Weather Monitor',

    update_interval = 3,
    use_xft = true,
    xftalpha = 0.95,
    text_buffer_size = 2048,

    draw_shades = false,
    draw_outline = false,
    draw_borders = false,

    default_color = 'white',
    color1 = '#87CEEB',
    color2 = '#00FFFF',
    color3 = '#FFA500',
    color4 = '#98FB98',
};

conky.text = [[
${image ~/Imagem/png-pi.png -p 8,8 -s 245x58 -f 86400}

${voffset 20}

${color1}${alignc}🕒 RELÓGIO${alignc}
${color2}${alignc}${font DejaVu Sans Mono:size=28}${time %H:%M}${font}
${color2}${alignc}${time %A, %d de %B de %Y}

${voffset 18}
${color1}${alignc}🌤️ ESTAÇÃO WH1080${alignc}

${voffset 12}
${color1}🌡️ Temperatura
${color2}${alignc}${font DejaVu Sans Mono:size=27}${execi 4 ~/.config/conky/weather/get_value.sh temp}°C${font}
${color3}${alignc}Sensação: ${execi 4 ~/.config/conky/weather/get_value.sh feelslike}°C

${voffset 8}
${color1}💧 Umidade                  Ponto de Orvalho
${color2}${alignc}${execi 4 ~/.config/conky/weather/get_value.sh hum}%                  ${execi 4 ~/.config/conky/weather/get_value.sh dew}°C

${color1}📊 Pressão
${color2}${alignc}${execi 4 ~/.config/conky/weather/get_value.sh pressure} hPa

${voffset 10}
${color1}🌬️ Vento
${color2}${alignc}${execi 4 ~/.config/conky/weather/get_value.sh wind} km/h   ${execi 4 ~/.config/conky/weather/get_value.sh dir}
${color2}${alignc}${font DejaVu Sans Mono:size=32}${execi 4 ~/.config/conky/weather/wind_compass.sh}${font}

${color1}💨 Rajada
${color2}${alignc}${execi 4 ~/.config/conky/weather/get_value.sh gust} km/h

${voffset 8}
${color1}🌧️ Precipitação
${color2}${alignc}Hoje: ${execi 4 ~/.config/conky/weather/get_value.sh rain} mm
${color2}${alignc}Taxa: ${execi 4 ~/.config/conky/weather/get_value.sh rainrate} mm/h

${voffset 8}
${color1}☀️ Solar / UV
${color2}${alignc}Solar: ${execi 6 ~/.config/conky/weather/get_value.sh solar} W/m²    UV: ${execi 6 ~/.config/conky/weather/get_value.sh uv}

${voffset 10}
${color1}📈 Extremos do Dia
${color2}${alignc}Máx: ${execi 10 ~/.config/conky/weather/get_value.sh tempmax}°C     Mín: ${execi 10 ~/.config/conky/weather/get_value.sh tempmin}°C

${voffset 12}
${color3}${alignc}Atualizado: ${exec date +%H:%M:%S}
]];
